services:
  - type: web
    name: telegram-trading-bot
    runtime: python
    pythonVersion: "3.11.0"  # FORZA Python 3.11 esplicitamente
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
    plan: free
